<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Launchpad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fefcf9;
      --bg2: #f5f0e8;
      --bg3: #ede6d6;
      --nav-bg: rgba(245,240,232,0.8);
      --border: rgba(45,36,23,0.08);
      --border-hover: rgba(45,36,23,0.18);
      --text: #2d2417;
      --text-muted: #8a7660;
      --text-dim: #b8a898;
      --radius: 10px;

      /* 四大暖陽主色 */
      --c-ai: #c0553a;        /* 磚紅 */
      --c-sheet: #5b7fa6;     /* 藍灰石板 */
      --c-flow: #6a8c69;      /* 橄欖綠鼠尾草 */
      --c-class: #c48a2e;     /* 蜂蜜琥珀 */

      /* 動態透明背景與邊框 (以 color-mix 自動調和) */
      --c-ai-bg: color-mix(in srgb, var(--c-ai) 8%, transparent);
      --c-sheet-bg: color-mix(in srgb, var(--c-sheet) 8%, transparent);
      --c-flow-bg: color-mix(in srgb, var(--c-flow) 8%, transparent);
      --c-class-bg: color-mix(in srgb, var(--c-class) 8%, transparent);

      /* 專案與備課主從層配色 */
      --layer-flow-bg: color-mix(in srgb, var(--c-flow) 6%, transparent);
      --layer-flow-border: color-mix(in srgb, var(--c-flow) 20%, transparent);
      --layer-flow-bar: color-mix(in srgb, var(--c-flow) 35%, transparent);

      --layer-class-bg: color-mix(in srgb, var(--c-class) 6%, transparent);
      --layer-class-border: color-mix(in srgb, var(--c-class) 20%, transparent);
      --layer-class-bar: color-mix(in srgb, var(--c-class) 35%, transparent);

      /* 精緻柔和陰影 */
      --shadow-nav: 0 8px 30px 0 rgba(45, 36, 23, 0.05);
      --shadow-card: 0 4px 12px rgba(45, 36, 23, 0.02);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 12px;
      z-index: 100;
      background: var(--nav-bg, rgba(22,22,26,0.75));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 16px;
      margin: 12px auto 0 auto;
      max-width: 900px;
      width: calc(100% - 40px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: var(--shadow-nav);
    }

    .nav-logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .tab-bar { display: flex; gap: 8px; }

    .tab {
      flex: none;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .tab:hover { background: var(--bg3); color: var(--text); transform: translateY(-1px); }
    .tab.active {
      background: var(--bg3);
      border-color: var(--border-hover);
      color: var(--text);
      box-shadow: var(--shadow-card);
    }
    .tab .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .tab:hover .dot { transform: scale(1.25); }
    .tab[data-page="01-工作站"] .dot { background: var(--c-ai); }
    .tab[data-page="02-專案中"] .dot { background: var(--c-flow); }
    .tab[data-page="03-備課站"] .dot { background: var(--c-class); }

    /* ── EDIT BUTTON ── */
    .edit-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .edit-btn:hover {
      background: var(--bg3);
      border-color: var(--border-hover);
      color: var(--text-muted);
    }

    /* ── MAIN ── */
    main { flex: 1; padding: 20px; padding-top: 28px; max-width: 900px; width: 100%; margin: 0 auto; }

    /* ── PAGE ── */
    .page { display: none; animation: fadeUp 0.25s ease both; }
    .page.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTION ── */
    .section { margin-bottom: 2rem; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ── ICON ── */
    .icon-wrap {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      overflow: hidden;
    }
    .icon-wrap img { width: 22px; height: 22px; object-fit: contain; border-radius: 4px; }

    .sheet-icon-wrap {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      overflow: hidden;
    }
    .sheet-icon-wrap img { width: 26px; height: 26px; object-fit: contain; border-radius: 4px; }

    /* ── SHEET GRID ── */
    .sheet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 10px; }
    .sheet-chip {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none; color: var(--text);
      transition: all 0.2s ease; cursor: pointer;
      opacity: 0.9;
    }
    .sheet-chip:hover {
      background: var(--c-sheet-bg);
      border-color: color-mix(in srgb, var(--c-sheet) 25%, transparent);
      transform: translateY(-1px);
      opacity: 1;
      box-shadow: 0 4px 12px color-mix(in srgb, var(--c-sheet) 10%, transparent);
    }
    .sheet-name { font-size: 14px; font-weight: 500; line-height: 1.35; }
    .sheet-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    /* ── CARD GRID ── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px,1fr)); gap: 10px; }
    .card {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none; color: var(--text);
      transition: all 0.2s ease; cursor: pointer;
      opacity: 0.9;
    }
    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
      opacity: 1;
    }
    .card.ai:hover    { background: var(--c-ai-bg);    border-color: color-mix(in srgb, var(--c-ai) 25%, transparent); box-shadow: 0 4px 12px color-mix(in srgb, var(--c-ai) 10%, transparent); }
    .card.flow:hover  { background: var(--c-flow-bg);  border-color: color-mix(in srgb, var(--c-flow) 25%, transparent); box-shadow: 0 4px 12px color-mix(in srgb, var(--c-flow) 10%, transparent); }
    .card.class:hover { background: var(--c-class-bg); border-color: color-mix(in srgb, var(--c-class) 25%, transparent); box-shadow: 0 4px 12px color-mix(in srgb, var(--c-class) 10%, transparent); }
    .card.sheet:hover { background: var(--c-sheet-bg); border-color: color-mix(in srgb, var(--c-sheet) 25%, transparent); box-shadow: 0 4px 12px color-mix(in srgb, var(--c-sheet) 10%, transparent); }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── PRIMARY 主層（02、03 專用）── */
    .section.is-primary .card {
      background: var(--primary-card-bg, var(--bg2));
      border-color: var(--primary-card-border, var(--border));
      box-shadow: var(--shadow-card);
    }
    .section.is-primary .card:hover {
      box-shadow: 0 6px 18px color-mix(in srgb, var(--primary-card-border) 40%, transparent);
    }

    /* ── SUB 子層（02、03 專用）── */
    .section.is-sub {
      margin-left: 12px;
      padding-left: 14px;
      border-left: 2px solid var(--sub-bar-color, rgba(167,139,250,0.35));
    }
    .section.is-sub .section-label { font-size: 9px; opacity: 0.65; }
    .section.is-sub .card-grid { grid-template-columns: repeat(auto-fill, minmax(135px,1fr)); }
    .section.is-sub .card {
      padding: 9px 11px;
      background: transparent;
      border: 1px dashed var(--border);
      opacity: 0.7;
      box-shadow: none;
    }
    .section.is-sub .card:hover {
      opacity: 1;
      border-style: solid;
    }
    .section.is-sub .icon-wrap { width: 28px; height: 28px; font-size: 14px; }
    .section.is-sub .icon-wrap img { width: 16px; height: 16px; }
    .section.is-sub .card-name { font-size: 12px; }
    .section.is-sub .card-desc { font-size: 11px; }

    /* ── LOADING ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; flex-direction: column; gap: 12px;
      font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim);
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--c-ai);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--text-dim);
      display: flex; justify-content: space-between; align-items: center;
    }

    /* ── PENDING ── */
    .pending {
      display: inline-block; font-size: 9px; padding: 2px 6px;
      border-radius: 4px; background: rgba(245,158,11,0.15); color: #f59e0b;
      margin-left: 4px; vertical-align: middle;
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-logo">⬡ AI Launchpad</span>
    <div class="tab-bar" id="tabBar"></div>
    <a class="edit-btn"
       href="https://docs.google.com/spreadsheets/d/1Pt21pLeI-jfsS9oZJrRH6kGilSqkNQjX5nzfAXuUI4c/edit"
       target="_blank" rel="noopener">✏️ 編輯</a>
  </nav>

  <main id="main">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>載入工具清單中…</span>
    </div>
  </main>

  <footer>
    <span>⬡ AI Launchpad · 個人版</span>
    <span id="last-update"></span>
  </footer>

  <script>
    // ── 設定 ──
    const SHEET_ID  = '1Pt21pLeI-jfsS9oZJrRH6kGilSqkNQjX5nzfAXuUI4c';
    const TOOLS_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=tools`;
    const THEME_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=theme`;

    // ── 全域變數 ──
    let allTools = [];

    // ── 常數 ──
    const PAGE_EMOJI    = { '01-工作站':'🛠️', '02-專案中':'📁', '03-備課站':'📚' };
    const HOVERED_CLASS = { '01-工作站':'ai', '02-專案中':'flow', '03-備課站':'class' };
    const PAGE_COLOR    = { '01-工作站':'var(--c-ai)', '02-專案中':'var(--c-flow)', '03-備課站':'var(--c-class)' };
    const LAYER_COLORS  = {
      '02-專案中': { bg: 'var(--layer-flow-bg)',  border: 'var(--layer-flow-border)',  bar: 'var(--layer-flow-bar)' },
      '03-備課站': { bg: 'var(--layer-class-bg)', border: 'var(--layer-class-border)', bar: 'var(--layer-class-bar)' },
    };

    // ── 圖示渲染 ──
    function renderIcon(iconVal, url, wrapClass) {
      const w = `class="${wrapClass}"`;
      if (iconVal && iconVal.startsWith('http')) {
        return `<div ${w}><img src="${iconVal}" alt="" onerror="this.parentElement.textContent='🔗'"></div>`;
      }
      if (!iconVal && url && url.startsWith('http')) {
        try {
          const domain = new URL(url).hostname;
          return `<div ${w}><img src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" alt="" onerror="this.parentElement.textContent='🔗'"></div>`;
        } catch(e) { return `<div ${w}>🔗</div>`; }
      }
      return `<div ${w}>${iconVal || '🔗'}</div>`;
    }

    // ── CSV 解析 ──
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let val = '';
      let inQuote = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (inQuote) {
          if (c === '"') {
            if (next === '"') {
              val += '"';
              i++;
            } else {
              inQuote = false;
            }
          } else {
            val += c;
          }
        } else {
          if (c === '"') {
            inQuote = true;
          } else if (c === ',') {
            row.push(val);
            val = '';
          } else if (c === '\r' || c === '\n') {
            row.push(val);
            val = '';
            if (row.length > 0 && (row.length > 1 || row[0] !== '')) {
              rows.push(row);
            }
            row = [];
            if (c === '\r' && next === '\n') {
              i++;
            }
          } else {
            val += c;
          }
        }
      }
      if (val !== '' || row.length > 0) {
        row.push(val);
        rows.push(row);
      }

      if (rows.length === 0) return [];

      const headerRow = rows[0];
      const headers = headerRow.map(h => h.trim().split(/[\s←]+/)[0] || h.trim());

      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (r[i] || '').trim();
        });
        return obj;
      });
    }

    // ── 套用主題 ──
    function applyTheme(rows) {
      const map = {};
      rows.forEach(r => { if (r['設定項目'] && r['值']) map[r['設定項目']] = r['值']; });
      const set = (v, k) => { if (map[k]) document.documentElement.style.setProperty(v, map[k]); };
      set('--bg',           '背景色');
      set('--bg2',          '卡片色');
      set('--nav-bg',       '導覽列背景');
      set('--bg3',          '導覽列選中色');
      set('--border',       '卡片邊框色');
      set('--border-hover', '邊框懸停色');
      set('--text',         '主文字色');
      set('--text-muted',   '次文字色');
      set('--text-dim',     '輔助文字色');
      set('--c-ai',         'AI入口主色');
      set('--c-flow',       '工作流程主色');
      set('--c-class',      '課程專用主色');
      set('--c-sheet',      '試算表主色');
      set('--radius',       '圓角大小');
    }

    // ── 快捷鍵衝突檢查 ──
    function checkShortcutConflicts(tools) {
      const seen = {};
      const dups = [];
      tools.forEach(t => {
        const k = (t['快捷鍵'] || '').trim().toUpperCase();
        if (!k || k.length !== 1 || !/[A-Z]/.test(k)) return;
        if (seen[k]) { if (!dups.includes(k)) dups.push(k); }
        else { seen[k] = t['名稱'] || ''; }
      });
      if (dups.length > 0) {
        const lines = dups.map(k => {
          const names = tools.filter(t => (t['快捷鍵']||'').trim().toUpperCase()===k).map(t=>t['名稱']).join('、');
          return `  "${k}"  →  ${names}`;
        }).join('\n');
        setTimeout(() => alert(`⚠️ 快捷鍵衝突\n\n以下字母重複，只有第一個生效：\n${lines}\n\n請到試算表修正。`), 800);
      }
    }

    // ── 建立 UI ──
    function buildUI(tools) {
      allTools = tools;
      checkShortcutConflicts(tools);

      const main   = document.getElementById('main');
      const tabBar = document.getElementById('tabBar');
      main.innerHTML   = '';
      tabBar.innerHTML = '';

      // 過濾 + 排序
      const visible = tools
        .filter(t => t['顯示'] === '✓' && t['名稱'] && !t['名稱'].startsWith('←'))
        .sort((a, b) => parseInt(a['排序'] || 99) - parseInt(b['排序'] || 99));

      // 動態分頁順序
      const pageOrder = [];
      visible.forEach(t => {
        const pg = t['分頁'] || '';
        if (pg && !pageOrder.includes(pg)) pageOrder.push(pg);
      });

      // 分組
      const pages = {};
      pageOrder.forEach(p => pages[p] = []);
      visible.forEach(t => { if (t['分頁']) pages[t['分頁']].push(t); });

      // 建立 Tab
      let firstActive = true;
      pageOrder.forEach(pg => {
        if (!pages[pg]?.length) return;
        const btn = document.createElement('button');
        btn.className   = 'tab' + (firstActive ? ' active' : '');
        btn.dataset.page = pg;
        btn.innerHTML   = `<span class="dot"></span>${PAGE_EMOJI[pg] || '🔹'} ${pg}`;
        btn.onclick     = () => switchPage(pg);
        tabBar.appendChild(btn);
        firstActive = false;
      });

      // 建立分頁內容
      pageOrder.forEach(pg => {
        if (!pages[pg]?.length) return;
        const pageEl = document.createElement('div');
        pageEl.className = 'page' + (pageOrder.indexOf(pg) === 0 ? ' active' : '');
        pageEl.id = 'page-' + pg;

        // 區塊分組
        const blocks = {};
        pages[pg].forEach(t => {
          const b = t['區塊'] || '其他';
          if (!blocks[b]) blocks[b] = [];
          blocks[b].push(t);
        });

        Object.entries(blocks).forEach(([blockName, items]) => {
          const sec = document.createElement('div');
          sec.className = 'section';

          // 02、03 才套用主從層
          const useLayer = pg === '02-專案中' || pg === '03-備課站';
          if (useLayer) {
            const isSub = blockName.endsWith('檔案') || blockName.endsWith('資料');
            const c = LAYER_COLORS[pg];
            if (isSub) {
              sec.classList.add('is-sub');
              sec.style.setProperty('--sub-bar-color', c.bar);
            } else {
              sec.classList.add('is-primary');
              sec.style.setProperty('--primary-card-bg',     c.bg);
              sec.style.setProperty('--primary-card-border', c.border);
            }
          }

          // 區塊標題
          const hdr = document.createElement('div');
          hdr.className = 'section-header';
          const lbl = document.createElement('span');
          lbl.className  = 'section-label';
          lbl.style.color = PAGE_COLOR[pg] || 'var(--c-ai)';
          lbl.textContent = blockName;
          hdr.appendChild(lbl);
          hdr.appendChild(Object.assign(document.createElement('div'), { className: 'section-line' }));
          sec.appendChild(hdr);

          // 卡片
          const isSheet = pg === '試算表' && blockName === '試算表';
          const grid = document.createElement('div');
          grid.className = isSheet ? 'sheet-grid' : 'card-grid';

          items.forEach(t => {
            const url       = t['網址'] || '#';
            const isPending = url.includes('請填入');
            const iconVal   = t['圖示(emoji)'] || '';
            const badge     = isPending ? '<span class="pending">待填</span>' : '';

            const a = document.createElement('a');
            a.href    = isPending ? '#' : url;
            a.rel     = 'noopener';
            if (!isPending && t['開新分頁'] === '✓') a.target = '_blank';
            if (isPending) a.onclick = e => e.preventDefault();

            if (isSheet) {
              a.className = 'sheet-chip';
              a.innerHTML = `
                ${renderIcon(iconVal, url, 'sheet-icon-wrap')}
                <div>
                  <div class="sheet-name">${t['名稱']}${badge}</div>
                  ${t['說明'] ? `<div class="sheet-desc">${t['說明']}</div>` : ''}
                </div>`;
            } else {
              a.className = `card ${HOVERED_CLASS[pg] || ''}`;
              a.innerHTML = `
                ${renderIcon(iconVal, url, 'icon-wrap')}
                <div class="card-info">
                  <div class="card-name">${t['名稱']}${badge}</div>
                  ${t['說明'] ? `<div class="card-desc">${t['說明']}</div>` : ''}
                </div>`;
            }
            grid.appendChild(a);
          });

          sec.appendChild(grid);
          pageEl.appendChild(sec);
        });

        main.appendChild(pageEl);
      });

      document.getElementById('last-update').textContent =
        '更新：' + new Date().toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    }

    // ── 切換分頁 ──
    function switchPage(pg) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.page === pg));
      document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + pg));
    }

    // ── 初始化 ──
    async function init() {
      try {
        const [toolsText, themeText] = await Promise.all([
          fetch(TOOLS_CSV).then(r => r.text()),
          fetch(THEME_CSV).then(r => r.text())
        ]);
        applyTheme(parseCSV(themeText));
        buildUI(parseCSV(toolsText));
      } catch(e) {
        document.getElementById('loading').innerHTML =
          `<div style="color:#f87171;font-family:monospace;font-size:12px;">
            ❌ 無法載入試算表<br><br>
            <span style="color:#7a7a8c;">請確認試算表已設為「知道連結的人可以檢視」</span><br>
            <span style="color:#4a4a5a;font-size:10px;margin-top:8px;display:block;">${e.message}</span>
          </div>`;
      }
    }

    init();

    // ── 鍵盤快捷鍵 ──
    // keydown：攔截 Ctrl+字母 防止瀏覽器預設行為；處理分頁切換
    let activeKeys = {};

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      activeKeys[e.key.toUpperCase()] = true;

      // Ctrl+字母：只做 preventDefault，實際開啟在 keyup
      if (e.ctrlKey && !e.metaKey && e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
        e.preventDefault();
        return;
      }

      // 數字鍵 1-9：切換分頁
      const tabs = [...document.querySelectorAll('.tab')];
      if (!tabs.length) return;
      const cur = tabs.findIndex(t => t.classList.contains('active'));
      if (e.key >= '1' && e.key <= '9') {
        const t = tabs[parseInt(e.key) - 1];
        if (t) switchPage(t.dataset.page);
        return;
      }
      // 左右方向鍵：循環切換
      if (e.key === 'ArrowRight') switchPage(tabs[(cur + 1) % tabs.length].dataset.page);
      if (e.key === 'ArrowLeft')  switchPage(tabs[(cur - 1 + tabs.length) % tabs.length].dataset.page);
    });

    // keyup：Ctrl+字母 在放開時才執行開啟，避免側欄攔截
    document.addEventListener('keyup', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (e.key.length === 1 && /[a-zA-Z]/.test(e.key) && (e.ctrlKey || activeKeys['CONTROL'])) {
        const letter = e.key.toUpperCase();
        const tool = allTools.find(t => (t['快捷鍵'] || '').trim().toUpperCase() === letter);
        if (tool && tool['網址'] && !tool['網址'].includes('請填入')) {
          window.open(tool['網址'], '_blank', 'noopener,noreferrer');
        }
      }

      activeKeys = {};
    });
  </script>
</body>
</html>
